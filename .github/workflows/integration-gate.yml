name: integration-gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: binhminh
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d binhminh"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/binhminh
      STORE_ADAPTER: postgres
      WORKER_DISPATCH_TOKEN: ci-worker-token
      OPS_METRICS_TOKEN: ci-ops-token
      INTEGRATION_BASE_URL: http://127.0.0.1:3000
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm --prefix apps/web install --no-audit --no-fund

      - name: Run DB Migrations
        run: npm --prefix apps/web run db:migrate

      - name: Build App
        run: npm --prefix apps/web run build

      - name: Start App
        run: |
          npm --prefix apps/web run start -- -p 3000 > /tmp/binhminh-next.log 2>&1 &
          echo $! > /tmp/binhminh-next.pid

      - name: Wait For App Ready
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:3000/api/v1/health" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "[FAIL] App did not become ready in time"
          cat /tmp/binhminh-next.log || true
          exit 1

      - name: Deep Health Probe
        run: |
          body=$(curl -fsS "http://127.0.0.1:3000/api/v1/health?deep=1")
          echo "$body"
          echo "$body" | grep -q '"status":"fail"' && exit 1 || true

      - name: Run Integration Smoke Test
        run: npm --prefix apps/web run test:integration:smoke

      - name: Run Integration Postgres Test
        run: npm --prefix apps/web run test:integration:postgres

      - name: Fetch Ops Metrics
        run: npm --prefix apps/web run ops:metrics

      - name: Evaluate Ops Alerts
        run: npm --prefix apps/web run ops:alerts

      - name: Print App Log On Failure
        if: failure()
        run: cat /tmp/binhminh-next.log || true

      - name: Stop App
        if: always()
        run: |
          if [ -f /tmp/binhminh-next.pid ]; then
            kill "$(cat /tmp/binhminh-next.pid)" || true
          fi
